reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      Macquarie University (QS World 2025 #133) has no dedicated, publicly
      documented developer portal or open-data API platform. The strongest
      verified, live API surface is the Research Data Repository, which runs on
      Figshare for Institutions: the public Figshare REST API v2 returns
      Macquarie content (DOI prefix 10.25949, group id 39392) and the Figshare
      OAI-PMH endpoint responds to verb=Identify. The Library maintains real
      public open-source Alma tooling on GitHub. A Shibboleth/SAML IdP backs
      institutional SSO. The official macquarie-university GitHub org exists but
      has zero public repos. No Macquarie-branded endpoints were fabricated;
      Macquarie Bank (a separate financial institution with its own developer
      portal) was deliberately excluded.
    endpoints:
